<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cultivo Richard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#f8f9fa] font-sans p-4 pb-12">

    <div class="max-w-md mx-auto space-y-4">
        <!-- CABEÇALHO -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
            <div class="bg-[#3e7d44] p-4 flex items-center gap-2">
                <span class="text-white text-xl">📋</span>
                <h1 class="text-white font-bold text-lg">Cultivo Coentro RICHARD</h1>
            </div>

            <div class="p-5 space-y-4">
                <!-- Filas -->
                <div>
                    <label class="block text-[13px] font-bold text-[#3e7d44] mb-1">🌱 Quantas filas plantou?</label>
                    <div class="flex items-center border rounded-lg bg-[#f1f5f1] px-3 py-3">
                        <input type="number" id="filas" class="bg-transparent w-full outline-none text-gray-700 font-bold text-lg" placeholder="Ex: 150">
                        <span class="text-gray-400 text-xs border-l border-gray-300 pl-2 ml-2">filas</span>
                    </div>
                </div>

                <!-- Semente -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <label class="block text-[12px] font-bold text-[#3e7d44] mb-2 uppercase">Preço do Pacote de Coentro</label>
                    <input type="number" id="precoSemente" class="w-full border rounded-lg bg-white px-3 py-2 outline-none mb-3" placeholder="R$">
                    
                    <label class="block text-[12px] text-gray-700 mb-1 font-medium">Quantos pacotes usou?</label>
                    <select id="qtdSemente" class="w-full border rounded-lg bg-white px-2 py-2 text-sm outline-none">
                        <option value="0.5">Meio pacote</option>
                        <option value="1" selected>1 pacote</option>
                        <option value="1.5">1,5 pacote</option>
                        <option value="2">2 pacotes</option>
                    </select>
                </div>

                <!-- Adubo Orgânico Inicial -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <label class="block text-[12px] font-bold text-[#3e7d44] mb-2 uppercase">Preço da Saca: Adubo Orgânico</label>
                    <input type="number" id="precoAdubo" class="w-full border rounded-lg bg-white px-3 py-2 outline-none mb-3" placeholder="R$">
                    
                    <label class="block text-[12px] text-gray-700 mb-1 font-medium">Sacas no preparo da leira:</label>
                    <select id="qtdAduboLeira" class="w-full border rounded-lg bg-white px-2 py-2 text-sm outline-none">
                        <option value="0">0 saca</option>
                        <option value="0.5">0.5 saca</option>
                        <option value="1" selected>1 saca</option>
                        <option value="1.5">1.5 saca</option>
                    </select>
                </div>

                <!-- NPK e Calcário -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-[#3e7d44] mb-1">Preço KG NPK</label>
                        <input type="number" id="precoNpk" class="w-full border rounded-lg bg-[#f1f5f1] px-3 py-2 outline-none" placeholder="R$">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-[#3e7d44] mb-1">Calcário (Kg usado)</label>
                        <input type="number" id="qtdCalcario" class="w-full border rounded-lg bg-[#f1f5f1] px-3 py-2 outline-none" placeholder="Kg">
                    </div>
                </div>

                <!-- NOVO CARD: AOS 15 DIAS -->
                <div class="bg-blue-50 p-4 rounded-xl border-2 border-blue-100 space-y-3">
                    <h3 class="text-blue-800 font-bold text-sm flex items-center gap-2">
                        <span>📅</span> MANUTENÇÃO: Aos 15 dias
                    </h3>
                    <div>
                        <label class="block text-[11px] font-bold text-blue-700 uppercase">Tempo gasto com Capina + adubação (Horas)</label>
                        <input type="number" id="horasCapina" class="w-full border-blue-200 border rounded-lg bg-white px-3 py-2 outline-none" placeholder="Ex: 3">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-blue-700 uppercase">Adubo para Cobertura (Sacas)</label>
                        <select id="qtdAduboCobertura" class="w-full border-blue-200 border rounded-lg bg-white px-3 py-2 text-sm">
                            <option value="0">0 saca</option>
                            <option value="0.5">0.5 saca</option>
                            <option value="1">1 saca</option>
                        </select>
                    </div>
                </div>

                <!-- Mão de Obra Geral -->
                <div class="grid grid-cols-2 gap-3 border-t pt-3">
                    <div>
                        <label class="block text-[11px] font-bold text-[#3e7d44] mb-1">Horas Preparo Leira</label>
                        <input type="number" id="horasPreparo" class="w-full border rounded-lg bg-[#f1f5f1] px-3 py-2 outline-none" placeholder="Horas">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-[#3e7d44] mb-1">Valor Diária (8h)</label>
                        <input type="number" id="diaria" class="w-full border rounded-lg bg-[#f1f5f1] px-3 py-2 outline-none" placeholder="R$">
                    </div>
                </div>

                <button onclick="calcular()" class="w-full bg-[#b8e064] hover:bg-[#a8cf54] text-[#1b4332] font-black py-4 rounded-xl shadow-lg mt-2 transition-all active:scale-[0.98] uppercase text-lg">
                    Calcular Custo Real
                </button>
            </div>
        </div>

        <!-- RESULTADOS -->
        <div id="resultado-container" class="hidden space-y-4">
            <div class="flex flex-col gap-3">
                <div class="bg-white border-l-4 border-blue-500 rounded-lg p-4 shadow-sm">
                    <p class="text-gray-600 text-lg">Custo Fila (30 dias)</p>
                    <h2 id="custo-30" class="text-blue-600 text-3xl font-bold">R$ 0,00</h2>
                </div>
                <div class="bg-white border-l-4 border-orange-500 rounded-lg p-4 shadow-sm">
                    <p class="text-gray-600 text-lg">Custo Fila (40 dias)</p>
                    <h2 id="custo-40" class="text-orange-600 text-3xl font-bold">R$ 0,00</h2>
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="bg-white rounded-xl shadow-md p-5">
                <p class="text-center font-bold text-[#1b4332] mb-4 text-xs uppercase">📊 Onde está o seu custo (30 dias)</p>
                <canvas id="graficoCustos"></canvas>
            </div>

            <!-- MEMÓRIA DE CÁLCULO -->
            <div class="bg-white rounded-xl shadow-md p-5 border border-gray-100">
                <p class="font-bold text-[#1b4332] mb-1 uppercase text-xs">🔍 Memória de Cálculo</p>
                <p class="text-gray-500 text-[10px] mb-3 italic">Calculado com 20% de perda (10 filas geram 8 boas)</p>
                <div id="debug-log" class="font-mono text-[11px] text-gray-700 space-y-1 bg-gray-50 p-3 rounded"></div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        const BASE_FILAS = 150; 

        function calcular() {
            // Inputs Principais
            const filas = parseFloat(document.getElementById('filas').value) || 0;
            const precoSemente = parseFloat(document.getElementById('precoSemente').value) || 0;
            const qtdSemente = parseFloat(document.getElementById('qtdSemente').value) || 0;
            const precoAdubo = parseFloat(document.getElementById('precoAdubo').value) || 0;
            const qtdAduboLeira = parseFloat(document.getElementById('qtdAduboLeira').value) || 0;
            const qtdCalcario = parseFloat(document.getElementById('qtdCalcario').value) || 0;
            const precoNpk = parseFloat(document.getElementById('precoNpk').value) || 0;
            const horasPreparo = parseFloat(document.getElementById('horasPreparo').value) || 0;
            const diaria = parseFloat(document.getElementById('diaria').value) || 0;

            // Inputs Dia 15
            const horasCapina = parseFloat(document.getElementById('horasCapina').value) || 0;
            const qtdAduboCobertura = parseFloat(document.getElementById('qtdAduboCobertura').value) || 0;

            if (filas === 0) { alert("Informe a quantidade de filas!"); return; }

            const valorHora = diaria / 8;

            // 1. CÁLCULO DE INSUMOS
            const totalSemente = precoSemente * qtdSemente;
            const totalCalcario = qtdCalcario * 1.00;
            const totalAduboLeira = precoAdubo * qtdAduboLeira;
            const totalAduboCobertura = precoAdubo * qtdAduboCobertura;
            const totalNpk = (precoNpk / BASE_FILAS) * filas;

            // 2. MÃO DE OBRA
            const custoPreparo = horasPreparo * valorHora;
            const custoCapina = horasCapina * valorHora; // Tempo gasto informado
            const custoRegaHora = (5 / 60) * valorHora; // 5 min/dia

            // 3. TOTAIS
            const custoFixoTotal = totalSemente + totalCalcario + totalAduboLeira + totalAduboCobertura + totalNpk + custoPreparo + custoCapina;
            
            const total30 = custoFixoTotal + (custoRegaHora * 30);
            const total40 = custoFixoTotal + (custoRegaHora * 40);

            // 4. REGRA DA QUEBRA (20%)
            const filasRestante = filas * 0.8;

            // 5. EXIBIÇÃO
            document.getElementById('custo-30').innerText = `R$ ${(total30 / filasRestante).toFixed(2).replace('.', ',')}`;
            document.getElementById('custo-40').innerText = `R$ ${(total40 / filasRestante).toFixed(2).replace('.', ',')}`;

            // 6. LOG
            const log = [
                `Filas Reais Esperadas: ${filasRestante.toFixed(1)}`,
                `Semente: R$ ${totalSemente.toFixed(2)}`,
                `Adubos (Leira+Cobertura): R$ ${(totalAduboLeira + totalAduboCobertura).toFixed(2)}`,
                `NPK (Proporcional): R$ ${totalNpk.toFixed(2)}`,
                `Trabalho (Preparo+Capina): R$ ${(custoPreparo + custoCapina).toFixed(2)}`,
                `Rega (30 dias): R$ ${(custoRegaHora * 30).toFixed(2)}`
            ];
            document.getElementById('debug-log').innerHTML = log.map(l => `<div>• ${l}</div>`).join('');
            document.getElementById('resultado-container').classList.remove('hidden');

            // 7. GRÁFICO
            const ctx = document.getElementById('graficoCustos').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Insumos', 'Adubação', 'NPK', 'Mão de Obra', 'Rega'],
                    datasets: [{
                        data: [
                            totalSemente + totalCalcario,
                            totalAduboLeira + totalAduboCobertura,
                            totalNpk,
                            custoPreparo + custoCapina,
                            custoRegaHora * 30
                        ],
                        backgroundColor: ['#1b4332', '#2d6a4f', '#40916c', '#74c69d', '#b8e064'],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
